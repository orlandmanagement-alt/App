<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Initial Setup</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <b>Initial Setup</b>
        <span class="small">Super Admin</span>
      </div>

      <div class="small">
        Halaman ini hanya aktif jika belum ada <b>super_admin</b>.
        Setelah berhasil, kamu akan login dan masuk dashboard.
      </div>

      <div style="height:10px"></div>
      <input id="name" placeholder="display name (optional)" />
      <div style="height:8px"></div>
      <input id="email" placeholder="email" />
      <div style="height:8px"></div>
      <input id="pass" type="password" placeholder="password (min 10)" />
      <div style="height:12px"></div>

      <button id="go" style="width:100%">Create Super Admin</button>

      <details style="margin-top:10px">
        <summary class="small">Debug</summary>
        <pre id="out"></pre>
      </details>

      <div class="small" style="margin-top:10px">
        <a href="/index.html">Ke login</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>window.OrlandApp.initSetup();</script>
</body>
</html>
