<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orland Management — Security</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}</style>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>

<body data-page="authed">
  <div id="toast-host" class="toast-host"></div>

  <div class="shell">
    <aside id="sidebar" class="sidebar">
      <div class="orland-card p-3">
        <div class="brand">
          <div class="logo"><i class="fa-solid fa-gem"></i></div>
          <div>
            <div style="font-size:16px">Orland Management</div>
            <div class="small-muted" style="font-size:12px">Dashboard</div>
          </div>
        </div>

        <hr style="border-color:var(--orland-border)">

        <div class="d-flex align-items-center gap-2 mb-2">
          <img id="meAvatar" class="avatar" alt="avatar">
          <div style="min-width:0">
            <div id="meName" style="font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
            <div id="meRole" class="small-muted" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
          </div>
        </div>

        <div id="navList" class="d-grid gap-1 mt-2"></div>

        <div class="d-grid gap-2 mt-3">
          <button id="btnLogout" class="orland-btn-ghost"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button id="navToggle" class="orland-btn-ghost d-lg-none"><i class="fa-solid fa-bars"></i></button>
          <div>
            <div id="pageTitle" style="font-weight:900;font-size:18px">—</div>
            <div id="pageSubtitle" class="small-muted" style="font-size:12px">—</div>
          </div>
        </div>

        <div class="d-flex gap-2 flex-wrap justify-content-end">
          <a class="orland-btn-ghost" href="/dashboard.html"><i class="fa-solid fa-gauge me-2"></i>Overview</a>
          <a class="orland-btn-ghost" href="/users.html"><i class="fa-solid fa-users me-2"></i>Users</a>
          <a class="orland-btn-ghost" href="/rbac.html"><i class="fa-solid fa-user-shield me-2"></i>RBAC</a>
          <a class="orland-btn-ghost" href="/security.html"><i class="fa-solid fa-shield-halved me-2"></i>Security</a>
        </div>
      </div>

      <div id="pageBody">

<div class="row g-3 mb-3">
  <div class="col-md-3"><div class="kpi"><div class="small-muted">Active IP Blocks</div><div id="kpiActiveBlocks" style="font-size:26px;font-weight:900">—</div></div></div>
  <div class="col-md-3"><div class="kpi"><div class="small-muted">Password Fail</div><div id="kpiPwFail" style="font-size:26px;font-weight:900">—</div></div></div>
  <div class="col-md-3"><div class="kpi"><div class="small-muted">Rate Limited</div><div id="kpiRate" style="font-size:26px;font-weight:900">—</div></div></div>
  <div class="col-md-3"><div class="kpi"><div class="small-muted">Session Anomaly</div><div id="kpiAnom" style="font-size:26px;font-weight:900">—</div></div></div>
</div>

<div class="orland-card p-3 mb-3">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div>
      <div style="font-weight:900">Trend (Hourly)</div>
      <div class="small-muted" style="font-size:12px">/api/security/hourly</div>
    </div>
    <div class="d-flex gap-2">
      <select id="days" class="form-select orland-input" style="width:150px">
        <option value="7" selected>7 days</option>
        <option value="30">30 days</option>
      </select>
      <button id="btnLoad" class="orland-btn-ghost"><i class="fa-solid fa-rotate me-2"></i>Reload</button>
    </div>
  </div>
  <div id="chart" class="mt-3 small-muted">Loading…</div>
</div>

<div class="orland-card p-3">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div>
      <div style="font-weight:900">Top IP Activity</div>
      <div class="small-muted" style="font-size:12px">/api/security/ip-activity?kind=password_fail</div>
    </div>
    <button id="btnTop" class="orland-btn-ghost">Reload</button>
  </div>
  <div id="topTable" class="table-responsive mt-3"></div>
</div>

<script>window.__PAGE__="security";</script>

      </div>

      <details class="mt-3">
        <summary class="small-muted">Debug</summary>
        <pre id="debugOut" class="small-muted mt-2" style="white-space:pre-wrap"></pre>
      </details>

      <div class="small-muted text-center mt-3">© Orland Management</div>
    </main>
  </div>

  <script src="/assets/js/app.js"></script>
</body></html>
