<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orland Management — Dashboard</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- App Theme -->
  <link href="/css/style.css" rel="stylesheet">
</head>

<body class="om-bg">
  <div class="om-app">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="om-sidebar">
      <div class="om-brand">
        <div class="om-brand-badge"><i class="fa-solid fa-crown"></i></div>
        <div class="om-brand-text">
          <div class="om-brand-title">Orland Management</div>
          <div class="om-brand-sub">Admin Dashboard</div>
        </div>
      </div>

      <div class="om-usercard">
        <div class="om-user-avatar"><i class="fa-solid fa-user-shield"></i></div>
        <div class="om-user-meta">
          <div id="meName" class="om-user-name">…</div>
          <div id="meRole" class="om-user-role">…</div>
        </div>
      </div>

      <div class="om-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="menuSearch" class="form-control form-control-sm" placeholder="Search menu…" />
      </div>

      <nav id="sidebarMenu" class="om-menu"></nav>

      <div class="om-sidebar-footer">
        <button id="logout" class="btn btn-sm btn-outline-light w-100">
          <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="om-main">

      <!-- TOPBAR -->
      <header class="om-topbar">
        <button id="btnToggleSidebar" class="btn om-iconbtn" type="button" aria-label="Toggle sidebar">
          <i class="fa-solid fa-bars"></i>
        </button>

        <div class="om-topbar-title">
          <div id="pageTitle" class="om-page-title">Dashboard</div>
          <div id="pageSub" class="om-page-sub">Ringkasan sistem</div>
        </div>

        <div class="om-topbar-actions">
          <span class="om-pill"><i class="fa-solid fa-shield-halved me-2"></i>Secure</span>
          <a class="btn om-iconbtn" href="#/users" title="Users"><i class="fa-solid fa-users"></i></a>
          <a class="btn om-iconbtn" href="#/roles" title="Roles"><i class="fa-solid fa-id-badge"></i></a>
          <a class="btn om-iconbtn" href="#/menus" title="Menus"><i class="fa-solid fa-sitemap"></i></a>
        </div>
      </header>

      <!-- CONTENT -->
      <section class="om-content">
        <!-- Quick stats (optional) -->
        <div id="quickStats" class="row g-3 mb-3">
          <div class="col-12 col-md-6 col-xl-3">
            <div class="om-card om-card-hover">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="om-muted">Users</div>
                  <div id="statUsers" class="om-h3">—</div>
                </div>
                <div class="om-stat-icon"><i class="fa-solid fa-users"></i></div>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6 col-xl-3">
            <div class="om-card om-card-hover">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="om-muted">Roles</div>
                  <div id="statRoles" class="om-h3">—</div>
                </div>
                <div class="om-stat-icon"><i class="fa-solid fa-id-badge"></i></div>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6 col-xl-3">
            <div class="om-card om-card-hover">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="om-muted">Menus</div>
                  <div id="statMenus" class="om-h3">—</div>
                </div>
                <div class="om-stat-icon"><i class="fa-solid fa-sitemap"></i></div>
              </div>
            </div>
          </div>
          <div class="col-12 col-md-6 col-xl-3">
            <div class="om-card om-card-hover">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <div class="om-muted">Status</div>
                  <div class="om-h3 text-success">OK</div>
                </div>
                <div class="om-stat-icon"><i class="fa-solid fa-circle-check"></i></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Panel content -->
        <div id="panel" class="om-card"></div>

        <!-- Debug -->
        <details class="mt-3">
          <summary class="om-muted">Debug JSON</summary>
          <pre id="out" class="om-pre mt-2"></pre>
        </details>
      </section>
    </main>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>window.OrlandApp.initDashboard();</script>
</body>
</html>
