<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orland Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card" style="width:min(980px,100%)">
      <div class="topbar">
        <b>Dashboard</b>
        <button id="logout">Logout</button>
      </div>

      <div id="me" class="small">Loading...</div>

      <hr style="border:none;border-top:1px solid #eee;margin:12px 0" />

      <div class="row">
        <button id="loadTalents">Load Talents</button>
        <button id="createTalent">Create Talent</button>
        <button id="uploadAvatar">Upload Foto (R2)</button>
      </div>

      <div style="height:10px"></div>
      <pre id="out"></pre>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    window.OrlandApp.initDashboard();
  </script>
</body>
</html>
